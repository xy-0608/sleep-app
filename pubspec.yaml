name: sleep_app
description: A beautiful sleep meditation app with white noise and sleep tracking
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  flutter_audio_waveforms: ^1.2.3
  just_audio: ^0.9.36
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^16.1.0
  intl: ^0.19.0
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
