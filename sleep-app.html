<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌙 Sleep App - 睡眠助眠</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  background-color: #1a1a1a;
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#app {
  width: 100%;
  max-width: 500px;
  height: 100vh;
  max-height: 900px;
  background-color: #121212;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}

.screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  display: flex;
  flex-direction: column;
}

.screen.active {
  opacity: 1;
  pointer-events: all;
}

.navbar {
  padding: 16px;
  text-align: center;
  background-color: #121212;
}

.navbar-title {
  font-size: 20px;
  font-weight: 600;
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* 分类 */
.categories {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-bottom: 16px;
  padding-bottom: 8px;
}

.category-btn {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid #3f3f3f;
  background-color: #1e1e1e;
  color: #ffffff;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.category-btn.active {
  background-color: #4f46e5;
  border-color: #4f46e5;
}

/* 主音量 */
.master-volume {
  background-color: #1e1e1e;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

.volume-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-weight: 500;
}

#volume-slider {
  width: 100%;
  margin-bottom: 12px;
  accent-color: #4f46e5;
}

.stop-all-btn {
  width: 100%;
  padding: 10px;
  background-color: #2d2d2d;
  color: #ffffff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

/* 声音网格 */
.sound-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.sound-card {
  background-color: #1e1e1e;
  border-radius: 16px;
  border: 2px solid transparent;
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.sound-card.playing {
  border-color: #4f46e5;
  background: linear-gradient(135deg, rgba(79, 70, 229, 0.2) 0%, rgba(79, 70, 229, 0.4) 100%);
}

.sound-card.locked {
  opacity: 0.5;
  cursor: not-allowed;
}

.sound-icon {
  font-size: 40px;
  margin-bottom: 8px;
  display: block;
}

.sound-name {
  font-size: 16px;
  font-weight: 500;
}

.playing-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  background-color: #4f46e5;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

/* 底部导航 */
.bottom-nav {
  display: flex;
  justify-content: space-around;
  background-color: #1e1e1e;
  padding: 8px 0 16px;
  border-top: 1px solid #2d2d2d;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: #888888;
  cursor: pointer;
  padding: 8px;
  transition: color 0.2s;
}

.nav-item.active {
  color: #4f46e5;
}

.nav-item span:first-child {
  font-size: 24px;
}

.nav-item span:last-child {
  font-size: 12px;
}

/* 睡眠页面 */
.sleep-content {
  display: flex;
  align-items: center;
  justify-content: center;
}

#not-tracking, #tracking {
  text-align: center;
  width: 100%;
}

.sleep-icon {
  margin: 40px 0 24px;
}

.sleep-icon span {
  font-size: 100px;
  color: #4f46e5;
}

.sleep-content h2 {
  font-size: 24px;
  margin-bottom: 16px;
}

.sleep-content p {
  color: #888888;
  line-height: 1.6;
  margin-bottom: 48px;
}

.primary-btn {
  padding: 16px 48px;
  background-color: #4f46e5;
  color: #ffffff;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

.text-btn {
  padding: 16px 24px;
  background: none;
  color: #888888;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

/* 脉冲动画 */
.pulse-animation {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 40px auto 32px;
}

.pulse-circle {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background-color: rgba(79, 70, 229, 0.3);
  animation: pulse 2s infinite;
}

.pulse-inner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background-color: #4f46e5;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

.pulse-inner span {
  font-size: 80px;
}

@keyframes pulse {
  0% {
    transform: scale(1);
    opacity: 0.7;
  }
  50% {
    transform: scale(1.15);
    opacity: 0.3;
  }
  100% {
    transform: scale(1);
    opacity: 0.7;
  }
}

.sleep-timer {
  font-size: 48px;
  font-weight: 300;
  letter-spacing: 2px;
  margin: 16px 0;
}

#bedtime-text {
  color: #888888;
  margin-bottom: 48px;
}

.tracking-buttons {
  display: flex;
  justify-content: center;
  gap: 24px;
}

/* 统计页面 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #888888;
}

.empty-state span {
  font-size: 80px;
  display: block;
  margin-bottom: 16px;
  opacity: 0.3;
}

.empty-state h3 {
  margin-bottom: 8px;
  color: #ffffff;
}

.overview-card {
  background-color: #1e1e1e;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  justify-content: space-around;
}

.overview-item {
  text-align: center;
  padding: 16px 8px;
}

.overview-item span:first-child {
  display: block;
  font-size: 24px;
  margin-bottom: 8px;
  color: #4f46e5;
}

.overview-value {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 4px;
}

.overview-label {
  font-size: 12px;
  color: #888888;
}

.records-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.record-item {
  background-color: #1e1e1e;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.record-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background-color: rgba(79, 70, 229, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.record-info {
  flex: 1;
}

.record-date {
  font-weight: 600;
  margin-bottom: 4px;
}

.record-time {
  color: #888888;
  font-size: 14px;
}

.record-duration {
  padding: 6px 12px;
  background-color: rgba(79, 70, 229, 0.1);
  color: #4f46e5;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
}

/* 弹窗 */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.7);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background-color: #1e1e1e;
  border-radius: 16px;
  padding: 24px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.modal-content h3 {
  margin-bottom: 8px;
}

.modal-content p {
  color: #888888;
  margin-bottom: 16px;
}

.stars {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.star-btn {
  background: none;
  border: none;
  font-size: 36px;
  cursor: pointer;
  transition: transform 0.2s;
}

.star-btn:hover {
  transform: scale(1.2);
}

/* 滚动条 */
.content::-webkit-scrollbar {
  width: 4px;
}

.content::-webkit-scrollbar-thumb {
  background-color: #3f3f3f;
  border-radius: 2px;
}
  </style>
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <div class="screen active" id="home-screen">
      <nav class="navbar">
        <span class="navbar-title">🌙 Sleep App</span>
      </nav>
      <div class="content">
        <!-- 分类标签 -->
        <div class="categories">
          <button class="category-btn active" data-category="自然">自然</button>
          <button class="category-btn" data-category="环境">环境</button>
          <button class="category-btn" data-category="冥想">冥想</button>
        </div>

        <!-- 主音量控制 -->
        <div id="master-volume" class="master-volume" style="display: none;">
          <div class="volume-header">
            <span>主音量</span>
            <span id="volume-value">70%</span>
          </div>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
          <button id="stop-all" class="stop-all-btn">停止全部</button>
        </div>

        <!-- 声音网格 -->
        <div id="sound-grid" class="sound-grid"></div>
      </div>
      <footer class="bottom-nav">
        <button class="nav-item active" data-screen="home">
          <span>🎵</span>
          <span>混音</span>
        </button>
        <button class="nav-item" data-screen="sleep">
          <span>😴</span>
          <span>睡眠</span>
        </button>
        <button class="nav-item" data-screen="stats">
          <span>📊</span>
          <span>统计</span>
        </button>
      </footer>
    </div>

    <!-- 睡眠追踪页面 -->
    <div class="screen" id="sleep-screen">
      <nav class="navbar">
        <span class="navbar-title">😴 睡眠追踪</span>
      </nav>
      <div class="content sleep-content">
        <div id="not-tracking">
          <div class="sleep-icon">
            <span>🌙</span>
          </div>
          <h2>准备好入睡了吗？</h2>
          <p>开始追踪后，我们会记录你的睡眠时长，帮助你了解睡眠习惯</p>
          <button id="start-tracking" class="primary-btn">开始睡眠</button>
        </div>

        <div id="tracking" style="display: none;">
          <div class="pulse-animation">
            <div class="pulse-circle"></div>
            <div class="pulse-inner">
              <span>😴</span>
            </div>
          </div>
          <h2>睡眠中...</h2>
          <div id="sleep-timer" class="sleep-timer">00:00:00</div>
          <p id="bedtime-text"></p>
          <div class="tracking-buttons">
            <button id="cancel-tracking" class="text-btn">取消</button>
            <button id="stop-tracking" class="primary-btn">起床</button>
          </div>
        </div>
      </div>
      <footer class="bottom-nav">
        <button class="nav-item" data-screen="home">
          <span>🎵</span>
          <span>混音</span>
        </button>
        <button class="nav-item active" data-screen="sleep">
          <span>😴</span>
          <span>睡眠</span>
        </button>
        <button class="nav-item" data-screen="stats">
          <span>📊</span>
          <span>统计</span>
        </button>
      </footer>
    </div>

    <!-- 统计页面 -->
    <div class="screen" id="stats-screen">
      <nav class="navbar">
        <span class="navbar-title">📊 睡眠统计</span>
      </nav>
      <div class="content" id="stats-content">
        <div id="empty-state" class="empty-state">
          <span>📊</span>
          <h3>暂无睡眠记录</h3>
          <p>开始第一次睡眠追踪后，这里会显示统计数据</p>
        </div>
        <div id="stats-data" style="display: none;">
          <div class="overview-card">
            <div class="overview-item">
              <span>🕒</span>
              <div>
                <div id="avg-sleep" class="overview-value">--</div>
                <div class="overview-label">平均睡眠</div>
              </div>
            </div>
            <div class="overview-item">
              <span>⭐</span>
              <div>
                <div id="avg-quality" class="overview-value">--</div>
                <div class="overview-label">平均质量</div>
              </div>
            </div>
            <div class="overview-item">
              <span>📅</span>
              <div>
                <div id="total-days" class="overview-value">--</div>
                <div class="overview-label">记录天数</div>
              </div>
            </div>
          </div>
          <h3 style="margin: 24px 0 16px;">最近记录</h3>
          <div id="records-list" class="records-list"></div>
        </div>
      </div>
      <footer class="bottom-nav">
        <button class="nav-item" data-screen="home">
          <span>🎵</span>
          <span>混音</span>
        </button>
        <button class="nav-item" data-screen="sleep">
          <span>😴</span>
          <span>睡眠</span>
        </button>
        <button class="nav-item active" data-screen="stats">
          <span>📊</span>
          <span>统计</span>
        </button>
      </footer>
    </div>
  </div>

  <!-- 质量评分弹窗 -->
  <div id="quality-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>睡眠质量如何？</h3>
      <p>给昨晚的睡眠打个分吧（1-5）</p>
      <div class="stars">
        <button class="star-btn" data-quality="1">⭐</button>
        <button class="star-btn" data-quality="2">⭐</button>
        <button class="star-btn" data-quality="3">⭐</button>
        <button class="star-btn" data-quality="4">⭐</button>
        <button class="star-btn" data-quality="5">⭐</button>
      </div>
    </div>
  </div>

  <script>
// 声音数据
const sounds = [
  // 自然类
  { id: 'rain', name: '雨声', category: '自然', icon: '🌧️', locked: false },
  { id: 'waves', name: '海浪', category: '自然', icon: '🌊', locked: false },
  { id: 'forest', name: '森林', category: '自然', icon: '🌲', locked: false },
  { id: 'wind', name: '风声', category: '自然', icon: '🍃', locked: false },
  { id: 'thunder', name: '雷暴', category: '自然', icon: '⚡', locked: false },
  // 环境类
  { id: 'fire', name: '篝火', category: '环境', icon: '🔥', locked: false },
  { id: 'fan', name: '风扇', category: '环境', icon: '💨', locked: false },
  { id: 'cafe', name: '咖啡馆', category: '环境', icon: '☕', locked: false },
  { id: 'train', name: '火车', category: '环境', icon: '🚂', locked: false },
  { id: 'plane', name: '飞机', category: '环境', icon: '✈️', locked: false },
  // 冥想类
  { id: 'singing', name: '颂钵', category: '冥想', icon: '🔔', locked: false },
  { id: 'binaural', name: '双脑同步', category: '冥想', icon: '🎵', locked: true },
  { id: 'delta', name: 'Delta波', category: '冥想', icon: '🧘', locked: true },
];

// 应用状态
let currentScreen = 'home';
let currentCategory = '自然';
let playingSounds = [];
let masterVolume = 0.7;
let audioContext = null;
let oscillators = {};

// 睡眠追踪状态
let isTracking = false;
let bedtime = null;
let timerInterval = null;
let sleepRecords = JSON.parse(localStorage.getItem('sleepRecords') || '[]');

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  initAudio();
  renderSounds();
  bindEvents();
  updateStats();
});

// 初始化音频（使用白噪音生成）
function initAudio() {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
}

// 生成白噪音
function createNoise() {
  const bufferSize = audioContext.sampleRate * 2;
  const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
  const output = buffer.getChannelData(0);
  
  for (let i = 0; i < bufferSize; i++) {
    output[i] = Math.random() * 2 - 1;
  }

  const noise = audioContext.createBufferSource();
  noise.buffer = buffer;
  noise.loop = true;

  const gainNode = audioContext.createGain();
  gainNode.gain.value = 0.1 * masterVolume;

  noise.connect(gainNode);
  gainNode.connect(audioContext.destination);
  noise.start();

  return { source: noise, gain: gainNode };
}

// 渲染声音网格
function renderSounds() {
  const grid = document.getElementById('sound-grid');
  const filteredSounds = sounds.filter(s => s.category === currentCategory);
  
  grid.innerHTML = filteredSounds.map(sound => `
    <div class="sound-card ${playingSounds.includes(sound.id) ? 'playing' : ''} ${sound.locked ? 'locked' : ''}" 
         data-id="${sound.id}">
      <span class="sound-icon">${sound.icon}</span>
      <div class="sound-name">${sound.name}</div>
      ${sound.locked ? '<div style="margin-top: 4px;"><span>🔒</span></div>' : ''}
      ${playingSounds.includes(sound.id) ? '<div class="playing-badge">▶</div>' : ''}
    </div>
  `).join('');

  // 绑定点击事件
  grid.querySelectorAll('.sound-card:not(.locked)').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      toggleSound(id);
    });
  });

  // 更新主音量显示
  const masterVolumeEl = document.getElementById('master-volume');
  if (playingSounds.length > 0) {
    masterVolumeEl.style.display = 'block';
  } else {
    masterVolumeEl.style.display = 'none';
  }
}

// 切换声音播放
function toggleSound(id) {
  if (playingSounds.includes(id)) {
    // 停止
    if (oscillators[id]) {
      oscillators[id].gain.gain.value = 0;
      oscillators[id].source.stop();
      delete oscillators[id];
    }
    playingSounds = playingSounds.filter(s => s !== id);
  } else {
    // 播放
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    oscillators[id] = createNoise();
    playingSounds.push(id);
  }
  updateVolume();
  renderSounds();
}

// 更新所有音量
function updateVolume() {
  Object.values(oscillators).forEach(({ gain }) => {
    gain.gain.value = 0.1 * masterVolume;
  });
  
  document.getElementById('volume-value').textContent = `${Math.round(masterVolume * 100)}%`;
}

// 停止所有声音
function stopAll() {
  Object.values(oscillators).forEach(({ source, gain }) => {
    gain.gain.value = 0;
    source.stop();
  });
  oscillators = {};
  playingSounds = [];
  renderSounds();
}

// 绑定事件
function bindEvents() {
  // 切换分类
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.category-btn.active').classList.remove('active');
      btn.classList.add('active');
      currentCategory = btn.dataset.category;
      renderSounds();
    });
  });

  // 主音量滑块
  document.getElementById('volume-slider').addEventListener('input', (e) => {
    masterVolume = parseFloat(e.target.value);
    updateVolume();
  });

  // 停止全部
  document.getElementById('stop-all').addEventListener('click', stopAll);

  // 底部导航切换屏幕
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const screen = btn.dataset.screen;
      switchScreen(screen);
    });
  });

  // 开始睡眠追踪
  document.getElementById('start-tracking').addEventListener('click', startTracking);

  // 取消追踪
  document.getElementById('cancel-tracking').addEventListener('click', cancelTracking);

  // 停止追踪
  document.getElementById('stop-tracking').addEventListener('click', () => {
    document.getElementById('quality-modal').style.display = 'flex';
  });

  // 质量评分
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const quality = parseInt(e.target.dataset.quality);
      stopTracking(quality);
      document.getElementById('quality-modal').style.display = 'none';
    });
  });

  // 点击遮罩关闭弹窗
  document.getElementById('quality-modal').addEventListener('click', (e) => {
    if (e.target.id === 'quality-modal') {
      e.target.style.display = 'none';
    }
  });
}

// 切换屏幕
function switchScreen(screenName) {
  document.querySelectorAll('.screen').forEach(screen => {
    screen.classList.remove('active');
  });
  document.querySelectorAll('.nav-item').forEach(nav => {
    nav.classList.remove('active');
  });
  
  document.getElementById(`${screenName}-screen`).classList.add('active');
  document.querySelector(`.nav-item[data-screen="${screenName}"]`).classList.add('active');
  currentScreen = screenName;

  if (screenName === 'stats') {
    updateStats();
  }
}

// 开始睡眠追踪
function startTracking() {
  isTracking = true;
  bedtime = new Date();
  
  document.getElementById('not-tracking').style.display = 'none';
  document.getElementById('tracking').style.display = 'block';
  
  document.getElementById('bedtime-text').textContent = 
    `入睡时间: ${formatTime(bedtime)}`;
  
  timerInterval = setInterval(updateTimer, 1000);
}

// 取消追踪
function cancelTracking() {
  isTracking = false;
  bedtime = null;
  clearInterval(timerInterval);
  document.getElementById('not-tracking').style.display = 'block';
  document.getElementById('tracking').style.display = 'none';
  stopAll();
}

// 停止追踪并保存
function stopTracking(quality) {
  const wakeTime = new Date();
  const duration = wakeTime - bedtime;
  
  const record = {
    date: new Date().toISOString(),
    bedtime: bedtime.toISOString(),
    wakeTime: wakeTime.toISOString(),
    durationMinutes: Math.floor(duration / (1000 * 60)),
    quality: quality
  };
  
  sleepRecords.unshift(record);
  localStorage.setItem('sleepRecords', JSON.stringify(sleepRecords));
  
  isTracking = false;
  clearInterval(timerInterval);
  stopAll();
  
  document.getElementById('not-tracking').style.display = 'block';
  document.getElementById('tracking').style.display = 'none';
  
  switchScreen('stats');
}

// 更新计时器
function updateTimer() {
  if (!bedtime) return;
  
  const duration = new Date() - bedtime;
  document.getElementById('sleep-timer').textContent = formatDuration(duration);
}

// 更新统计
function updateStats() {
  if (sleepRecords.length === 0) {
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('stats-data').style.display = 'none';
    return;
  }
  
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('stats-data').style.display = 'block';
  
  // 计算平均值
  const totalMinutes = sleepRecords.reduce((sum, r) => sum + r.durationMinutes, 0);
  const avgMinutes = Math.floor(totalMinutes / sleepRecords.length);
  const avgQuality = sleepRecords.reduce((sum, r) => sum + r.quality, 0) / sleepRecords.length;
  
  document.getElementById('avg-sleep').textContent = formatDurationShort(avgMinutes);
  document.getElementById('avg-quality').textContent = `${avgQuality.toFixed(1)} ⭐`;
  document.getElementById('total-days').textContent = `${sleepRecords.length}`;
  
  // 渲染最近记录
  const recordsList = document.getElementById('records-list');
  const recent = sleepRecords.slice(0, 10);
  
  recordsList.innerHTML = recent.map(record => {
    const date = new Date(record.date);
    const bd = new Date(record.bedtime);
    const wt = new Date(record.wakeTime);
    return `
      <div class="record-item">
        <div class="record-avatar">${record.quality}⭐</div>
        <div class="record-info">
          <div class="record-date">${formatDate(date)}</div>
          <div class="record-time">${formatTime(bd)} - ${formatTime(wt)}</div>
        </div>
        <div class="record-duration">${formatDurationShort(record.durationMinutes)}</div>
      </div>
    `;
  }).join('');
}

// 格式化工具
function formatTime(date) {
  return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
}

function formatDate(date) {
  return `${date.getMonth() + 1}月${date.getDate()}日`;
}

function formatDuration(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

function formatDurationShort(totalMinutes) {
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  return `${hours}h${minutes}m`;
}
